<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentation — preatorlabs</title>
<meta name="description" content="Documentation preatorlabs : rationale scientifique, méthodologie, architecture.">
<meta name="theme-color" content="#1a1a18">
<meta name="color-scheme" content="light">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=JetBrains+Mono:wght@400;500&family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f3ee;
  --bg-2: #ebe7dd;
  --ink: #1a1a18;
  --ink-soft: #4a4842;
  --ink-mute: #6e6c64;
  --rule: rgba(26, 26, 24, 0.12);
  --rule-strong: rgba(26, 26, 24, 0.25);
  --accent: #c44322;
  --accent-soft: #f4d9cf;
}
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter Tight', system-ui, sans-serif;
  line-height: 1.65;
  font-size: 16px;
}
.shell { max-width: 1180px; margin: 0 auto; padding: 0 32px; }
@media (max-width: 720px) { .shell { padding: 0 20px; } }

.topbar {
  border-bottom: 1px solid var(--rule);
  padding: 18px 0;
  position: sticky;
  top: 0;
  background: rgba(245, 243, 238, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 100;
}
.topbar-inner { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
.brand {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 22px;
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--ink);
  text-decoration: none;
}
.brand-mark {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--ink);
  position: relative;
  flex-shrink: 0;
}
.brand-mark::after {
  content: '';
  position: absolute;
  inset: 6px;
  background: var(--accent);
  border-radius: 50%;
}
.topbar-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.topbar-actions a, .topbar-actions button {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--ink-soft);
  background: transparent;
  border: 1px solid var(--rule-strong);
  padding: 6px 12px;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.topbar-actions a:hover, .topbar-actions button:hover {
  color: var(--ink);
  border-color: var(--ink);
}
.topbar-actions button.is-active {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}

.doc-layout {
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 48px;
  padding: 48px 0 96px;
  align-items: start;
}
@media (max-width: 900px) {
  .doc-layout { grid-template-columns: 1fr; gap: 28px; }
  .doc-nav { position: static !important; }
}

.doc-nav {
  position: sticky;
  top: 88px;
}
.doc-nav-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 14px;
}
.doc-nav a {
  display: block;
  font-size: 14px;
  color: var(--ink-soft);
  text-decoration: none;
  padding: 8px 0;
  border-bottom: 1px solid var(--rule);
  transition: color 0.2s;
}
.doc-nav a:hover { color: var(--ink); }
.doc-nav a.is-active {
  color: var(--ink);
  font-weight: 500;
}

.doc-main { min-width: 0; }
.doc-status {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--ink-mute);
  padding: 48px 0;
}
.doc-status.is-error { color: var(--accent); }

/* ============ Markdown prose ============ */
.md-prose { max-width: 720px; }
.md-prose h1 {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: clamp(28px, 4vw, 36px);
  letter-spacing: -0.02em;
  line-height: 1.2;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--rule);
}
.md-prose h2 {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 22px;
  letter-spacing: -0.01em;
  margin: 40px 0 14px;
  padding-top: 8px;
}
.md-prose h3 {
  font-family: 'Fraunces', serif;
  font-weight: 500;
  font-size: 18px;
  margin: 28px 0 10px;
}
.md-prose h4 {
  font-size: 15px;
  font-weight: 600;
  margin: 20px 0 8px;
  color: var(--ink-soft);
}
.md-prose p { margin-bottom: 14px; color: var(--ink-soft); }
.md-prose > blockquote,
.md-prose blockquote {
  border-left: 2px solid var(--accent);
  padding: 4px 0 4px 18px;
  margin: 20px 0;
  color: var(--ink-soft);
  font-style: italic;
}
.md-prose ul, .md-prose ol {
  margin: 0 0 16px 22px;
  color: var(--ink-soft);
}
.md-prose li { margin-bottom: 6px; }
.md-prose li > ul, .md-prose li > ol { margin-top: 6px; margin-bottom: 0; }
.md-prose a {
  color: var(--accent);
  text-decoration: underline;
  text-underline-offset: 3px;
}
.md-prose a:hover { color: var(--ink); }
.md-prose strong { color: var(--ink); font-weight: 600; }
.md-prose hr {
  border: none;
  border-top: 1px solid var(--rule);
  margin: 32px 0;
}
.md-prose code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.88em;
  background: var(--bg-2);
  padding: 2px 6px;
  border-radius: 2px;
  color: var(--ink);
}
.md-prose pre {
  background: var(--bg-2);
  border: 1px solid var(--rule);
  padding: 16px 18px;
  overflow-x: auto;
  margin: 16px 0 20px;
  font-size: 13px;
  line-height: 1.55;
}
.md-prose pre code {
  background: none;
  padding: 0;
  font-size: inherit;
}
.md-prose table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0 24px;
  font-size: 14px;
}
.md-prose th, .md-prose td {
  border: 1px solid var(--rule-strong);
  padding: 10px 14px;
  text-align: left;
  vertical-align: top;
}
.md-prose th {
  background: var(--bg-2);
  font-weight: 600;
  color: var(--ink);
}
.md-prose td { color: var(--ink-soft); }
.md-prose img { max-width: 100%; height: auto; }

.md-raw {
  display: none;
  max-width: 720px;
}
.md-raw.is-visible { display: block; }
.md-raw pre {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.55;
  background: var(--bg-2);
  border: 1px solid var(--rule);
  padding: 20px;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--ink-soft);
}
.md-prose.is-hidden { display: none; }
</style>
</head>
<body>

<header class="topbar">
  <div class="shell topbar-inner">
    <a class="brand" href="/">
      <span class="brand-mark" aria-hidden="true"></span>
      preatorlabs
    </a>
    <div class="topbar-actions">
      <a href="/">← accueil</a>
      <a href="/#demo">démo</a>
      <button type="button" id="btn-rendered" class="is-active" aria-pressed="true">Lecture</button>
      <button type="button" id="btn-raw" aria-pressed="false">Markdown brut</button>
      <a id="btn-download" href="#" download>télécharger .md</a>
    </div>
  </div>
</header>

<div class="shell doc-layout">
  <nav class="doc-nav" aria-label="Documentation">
    <div class="doc-nav-label">documentation</div>
    <div id="doc-nav-links"></div>
  </nav>

  <main class="doc-main">
    <div id="doc-status" class="doc-status">Chargement…</div>
    <article id="doc-rendered" class="md-prose" hidden></article>
    <div id="doc-raw" class="md-raw" hidden>
      <pre><code id="doc-raw-code"></code></pre>
    </div>
  </main>
</div>

<script>
const DOCS = [
  { file: '01-SCIENTIFIC-RATIONALE.md', label: 'Rationale scientifique' },
  { file: '02-METHODOLOGY.md', label: 'Méthodologie' },
  { file: '03-ARCHITECTURE.md', label: 'Architecture' },
  { file: '04-INTERPRETATION-GUIDE.md', label: 'Guide d\'interprétation' },
  { file: '05-ROADMAP.md', label: 'Roadmap' },
];

const ALLOWED = new Set(DOCS.map(d => d.file));

function getRequestedFile() {
  const params = new URLSearchParams(location.search);
  const f = params.get('f') || params.get('file') || '01-SCIENTIFIC-RATIONALE.md';
  const base = f.split('/').pop();
  if (!ALLOWED.has(base)) return null;
  return base;
}

function buildNav(activeFile) {
  const container = document.getElementById('doc-nav-links');
  container.innerHTML = '';
  DOCS.forEach(({ file, label }) => {
    const a = document.createElement('a');
    a.href = `/docs/view.html?f=${encodeURIComponent(file)}`;
    a.textContent = label;
    if (file === activeFile) a.classList.add('is-active');
    container.appendChild(a);
  });
}

function resolveMdLink(href) {
  if (!href || href.startsWith('http') || href.startsWith('#') || href.startsWith('mailto:')) {
    return href;
  }
  const name = href.split('/').pop();
  if (name && name.endsWith('.md') && ALLOWED.has(name)) {
    return `/docs/view.html?f=${encodeURIComponent(name)}`;
  }
  return href;
}

marked.setOptions({
  gfm: true,
  breaks: false,
});

const renderer = new marked.Renderer();
renderer.link = function link({ href, title, text }) {
  const resolved = resolveMdLink(href);
  const t = title ? ` title="${title.replace(/"/g, '&quot;')}"` : '';
  return `<a href="${resolved}"${t}>${text}</a>`;
};
marked.use({ renderer });

function setView(mode) {
  const rendered = document.getElementById('doc-rendered');
  const raw = document.getElementById('doc-raw');
  const btnR = document.getElementById('btn-rendered');
  const btnW = document.getElementById('btn-raw');
  const isRaw = mode === 'raw';
  rendered.classList.toggle('is-hidden', isRaw);
  rendered.hidden = isRaw;
  raw.classList.toggle('is-visible', isRaw);
  raw.hidden = !isRaw;
  btnR.classList.toggle('is-active', !isRaw);
  btnW.classList.toggle('is-active', isRaw);
  btnR.setAttribute('aria-pressed', String(!isRaw));
  btnW.setAttribute('aria-pressed', String(isRaw));
}

async function loadDoc(file) {
  const status = document.getElementById('doc-status');
  const rendered = document.getElementById('doc-rendered');
  const rawCode = document.getElementById('doc-raw-code');
  const download = document.getElementById('btn-download');

  if (!file) {
    status.textContent = 'Document non trouvé.';
    status.classList.add('is-error');
    return;
  }

  buildNav(file);
  document.title = `${DOCS.find(d => d.file === file)?.label || file} — preatorlabs`;
  download.href = `/docs/${file}`;
  download.download = file;

  try {
    const res = await fetch(`/docs/${file}`, { cache: 'default' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();
    rawCode.textContent = md;
    rendered.innerHTML = marked.parse(md);
    status.hidden = true;
    rendered.hidden = false;
    setView('rendered');
  } catch (err) {
    status.textContent = `Impossible de charger ${file} : ${err.message}`;
    status.classList.add('is-error');
    rendered.hidden = true;
  }
}

document.getElementById('btn-rendered').addEventListener('click', () => setView('rendered'));
document.getElementById('btn-raw').addEventListener('click', () => setView('raw'));

loadDoc(getRequestedFile());
</script>
</body>
</html>
