<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — preatorlabs</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=JetBrains+Mono:wght@400&family=Inter+Tight:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f3ee;
    color: #1a1a18;
    font-family: 'Inter Tight', system-ui, sans-serif;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 32px;
    line-height: 1.6;
  }
  .wrap { max-width: 540px; text-align: center; }
  .mark {
    width: 32px; height: 32px;
    border: 1.5px solid #1a1a18;
    border-radius: 50%;
    position: relative;
    margin: 0 auto 32px;
  }
  .mark::after {
    content: '';
    position: absolute;
    inset: 8px;
    background: #c44322;
    border-radius: 50%;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #6e6c64;
    margin-bottom: 18px;
  }
  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 400;
    font-size: clamp(36px, 6vw, 52px);
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 18px;
  }
  h1 em { color: #c44322; font-style: italic; }
  p { color: #4a4842; font-size: 16px; max-width: 460px; margin: 0 auto 28px; }
  a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 22px;
    background: #1a1a18;
    color: #f5f3ee;
    text-decoration: none;
    font-weight: 500;
    font-size: 15px;
    transition: background 0.18s;
  }
  a:hover { background: #c44322; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark" aria-hidden="true"></div>
    <div class="eyebrow">erreur 404 · page introuvable</div>
    <h1>Ce <em>segment</em> n'existe pas.</h1>
    <p>La page que tu cherches n'est pas dans l'index. Tu as peut-être suivi un lien périmé. Reviens à l'accueil pour reprendre l'analyse.</p>
    <a href="/">← Retour à preatorlabs</a>
  </div>
</body>
</html>
